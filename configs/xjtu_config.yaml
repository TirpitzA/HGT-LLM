dataset_name: "XJTU"
model_params:
  in_channels: 2
  num_classes: 5
  slice_length: 4096
  num_slices: 3
  num_nodes: 4
  cnn_hidden: 64
  gat_hidden: 64
  transformer_dim: 256
  transformer_heads: 4
  transformer_layers: 2
  dropout: 0.3

checkpoint_path: "bearllm_weights/best_model_xjtu.pth"
forbidden_words: ["预测状态", "置信度", "诊断结论", "内圈", "滚珠", "外圈", "保持架", "复合", "健康"]
data_dir: "data/"

components:
  0: "内圈 (Inner Race)"
  1: "外圈 (Outer Race)"
  2: "滚珠 (Rolling Element/Ball)"
  3: "保持架 (Cage)"

labels:
  0: "健康状态 (Healthy)"
  1: "内圈故障 (Inner race fault)"
  2: "外圈故障 (Outer race fault)"
  3: "保持架故障 (Cage fault)"
  4: "复合故障 (Compound fault)"

severities:
  0: ""
  1: ""
  2: ""
  3: ""
  4: ""

fault_mapping:
  1: ["Inner", "内圈"]
  2: ["Outer", "外圈"]
  3: ["Cage", "保持架"]
  4: ["Inner", "内圈", "Outer", "外圈"]

reasoning_chains:
  0: "各部件振动信噪比处于正常基线水平，未检测到周期性瞬态冲击，组件间信息交互规律平稳。"
  1: "推理链路: 内圈表面出现缺陷。内圈随主轴旋转，缺陷与滚动体周期性撞击产生的高频冲击特征被 GAT 层捕获。"
  2: "推理链路: 外圈出现剥落损伤。外圈固定不动，滚动体经过故障区域时引发持续冲击，图谱解析为外圈故障。"
  3: "推理链路: 保持架断裂或磨损引发非线性振动，节点信号呈现低频调制特征，模型识别为保持架故障。"
  4: "推理链路: 内圈与外圈节点均观测到高频冲击特征交织，能量在拓扑图中发生多路传导，符合复合故障特征。"
