dataset_name: "XJTU"
model_params:
  in_channels: 2
  num_classes: 5
  slice_length: 4096
  num_slices: 3
  num_nodes: 4
  cnn_hidden: 64
  gat_hidden: 64
  transformer_dim: 256
  transformer_heads: 4
  transformer_layers: 2
  dropout: 0.3

checkpoint_path: "bearllm_weights/best_backbone_xjtu.pth"
forbidden_words: ["预测状态", "置信度", "诊断结论", "内圈", "滚珠", "外圈", "保持架", "复合", "健康"]
data_dir: "data/XJTU_processed"

components:
  0: "内圈 (Inner Race)"
  1: "外圈 (Outer Race)"
  2: "滚珠 (Rolling Element/Ball)"
  3: "保持架 (Cage)"

labels:
  0: "健康状态 (Healthy)"
  1: "内圈故障 (Inner race fault)"
  2: "外圈故障 (Outer race fault)"
  3: "保持架故障 (Cage fault)"
  4: "复合故障 (Compound fault)"

severities:
  0: ""
  1: ""
  2: ""
  3: ""
  4: ""

fault_mapping:
  1: ["Inner", "内圈"]
  2: ["Outer", "外圈"]
  3: ["Cage", "保持架"]
  4: ["Inner", "内圈", "Outer", "外圈"]

reasoning_chains:
  0: "各通道振动信号稳定且处于正常基线水平，未发现明显的冲击脉冲或周期性异常，物理图谱节点间能量传递规律平稳。"
  1: "推理链路: 内圈检测到结构性损伤。由于内圈随轴高速旋转，损伤特征在全寿命周期初期被 GAT 层捕获，能量在时空图谱中呈现中心向外扩散态势，判定为内圈故障。"
  2: "推理链路: 外圈出现局部剥落损伤。外圈固定不转，损伤引发的周期性共振脉冲主导了局部节点响应，能量在物理图谱外缘高度汇聚，诊断为外圈故障。"
  3: "推理链路: 保持架出现断裂或过度磨损。引发了显著的非线性自激振动，节点信号呈现出低频调制与高频毛刺并存的特征，图谱解析为保持架故障。"
  4: "推理链路: 内圈与外圈节点均观测到显著的高频冲击特征交织，对应节点在图谱中发生多路非稳态信息耦合，符合多部件失效特征，认定为复合故障。"
