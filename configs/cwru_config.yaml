dataset_name: "CWRU"
model_params:
  in_channels: 1
  num_classes: 10
  slice_length: 1024
  num_slices: 3
  num_nodes: 4
  cnn_hidden: 32
  gat_hidden: 32
  transformer_dim: 64
  transformer_heads: 2
  transformer_layers: 2
  dropout: 0.3

checkpoint_path: "bearllm_weights/best_model_cwru.pth"
forbidden_words: ["预测状态", "置信度", "诊断结论", "内圈故障", "滚珠故障", "外圈故障", "健康"]
data_dir: "data/"

components:
  0: "内圈 (Inner Race)"
  1: "外圈 (Outer Race)"
  2: "滚珠 (Rolling Element/Ball)"
  3: "保持架 (Cage)"

labels:
  0: "健康状态 (Healthy)"
  1: "内圈轻度故障_0.007 (Minor Inner Race)"
  2: "内圈中度故障_0.014 (Moderate Inner Race)"
  3: "内圈重度故障_0.021 (Severe Inner Race)"
  4: "滚珠轻度故障_0.007 (Minor Ball)"
  5: "滚珠中度故障_0.014 (Moderate Ball)"
  6: "滚珠重度故障_0.021 (Severe Ball)"
  7: "外圈轻度故障_0.007 (Minor Outer Race)"
  8: "外圈中度故障_0.014 (Moderate Outer Race)"
  9: "外圈重度故障_0.021 (Severe Outer Race)"

severities:
  1: "轻微 (0.007英寸)"
  2: "中度 (0.014英寸)"
  3: "严重 (0.021英寸)"
  4: "轻微 (0.007英寸)"
  5: "中度 (0.014英寸)"
  6: "严重 (0.021英寸)"
  7: "轻微 (0.007英寸)"
  8: "中度 (0.014英寸)"
  9: "严重 (0.021英寸)"

fault_mapping:
  1: ["Inner", "内圈"]
  2: ["Inner", "内圈"]
  3: ["Inner", "内圈"]
  4: ["Ball", "滚珠"]
  5: ["Ball", "滚珠"]
  6: ["Ball", "滚珠"]
  7: ["Outer", "外圈"]
  8: ["Outer", "外圈"]
  9: ["Outer", "外圈"]

reasoning_chains:
  0: "各部件振动信噪比处于正常基线水平，未检测到周期性瞬态冲击，组件间信息交互规律平稳。"
  1: "推理链路: 内圈表面出现 {severity} 的缺陷。内圈随主轴旋转，缺陷与滚动体周期性撞击产生的高频冲击特征被 GAT 层捕获。异常能量流沿物理拓扑向外扩散，经由'滚珠'节点传导，导致图谱整体判别为内圈故障。"
  2: "推理链路: 内圈表面出现 {severity} 的缺陷。内圈随主轴旋转，缺陷与滚动体周期性撞击产生的高频冲击特征被 GAT 层捕获。异常能量流沿物理拓扑向外扩散，经由'滚珠'节点传导，导致图谱整体判别为内圈故障。"
  3: "推理链路: 内圈表面出现 {severity} 的缺陷。内圈随主轴旋转，缺陷与滚动体周期性撞击产生的高频冲击特征被 GAT 层捕获。异常能量流沿物理拓扑向外扩散，经由'滚珠'节点传导，导致图谱整体判别为内圈故障。"
  4: "推理链路: '滚珠'节点特征出现剧烈突变，表明存在 {severity} 的损伤。由于滚珠在公转与自转中同时撞击内、外圈滚道，GAT 检测到高能双向信息交互，图谱解析为滚珠故障。"
  5: "推理链路: '滚珠'节点特征出现剧烈突变，表明存在 {severity} 的损伤。由于滚珠在公转与自转中同时撞击内、外圈滚道，GAT 检测到高能双向信息交互，图谱解析为滚珠故障。"
  6: "推理链路: '滚珠'节点特征出现剧烈突变，表明存在 {severity} 的损伤。由于滚珠在公转与自转中同时撞击内、外圈滚道，GAT 检测到高能双向信息交互，图谱解析为滚珠故障。"
  7: "推理链路: 外圈承载区产生 {severity} 的剥落损伤。外圈固定不转，损伤引发的低频高幅共振主导了局部图谱节点，并阻断了向其他内层节点的正常信息流，图谱推理为外圈故障。"
  8: "推理链路: 外圈承载区产生 {severity} 的剥落损伤。外圈固定不转，损伤引发的低频高幅共振主导了局部图谱节点，并阻断了向其他内层节点的正常信息流，图谱推理为外圈故障。"
  9: "推理链路: 外圈承载区产生 {severity} 的剥落损伤。外圈固定不转，损伤引发的低频高幅共振主导了局部图谱节点，并阻断了向其他内层节点的正常信息流，图谱推理为外圈故障。"
